<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        html, body {
          height: 100%;
          width: 100%;
          background-color: #111
        }

        main{
            height: 100%;
            width: 100%;
            padding: 1rem 1rem;
            display: flex;
            flex-direction: row;
            align-items: start;
            flex-wrap: wrap;

        }
        .cards{
            width: 350px;
            background-color: crimson;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            flex-direction: column;
            padding: 1rem ;

        }
        .imag{
            height: 200px;
            width: 300px;
            background-color: #111;
            border-radius: 20px;
        }
        .imag img{
            height: 100%;
            width: 100%;

        }
        .cards h3{
            font-size: 28px;
            margin-top: 1rem;
            font-weight: 500;
        }
        .cards h4{
            font-size: 24px;
            margin-top: 0.6rem;
            font-weight: 500;
        }
        .cards h5{
            font-size: 20px;
            margin-top: 1rem;
            font-weight: 500;
        }
        .cards p{
            font-size: 16px;
            margin-top: 0.7rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <main>
      

    </main>
    
</body>
<script src="script.js"></script>
</html>
